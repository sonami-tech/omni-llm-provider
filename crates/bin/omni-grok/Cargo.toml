[package]
name = "omni-grok"
version.workspace = true
edition.workspace = true

[[bin]]
name = "omni-grok"
path = "src/main.rs"

[dependencies]
omni-common = { path = "../../omni-common" }
omni-core = { path = "../../omni-core" }
provider-grok = { path = "../../provider-grok" }

axum.workspace = true
tokio.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
uuid.workspace = true
reqwest.workspace = true
clap = { workspace = true }
anyhow = { workspace = true }

[dev-dependencies]
tower = { version = "0.5", features = ["util"] }
# Enable the build-and-locate helper used by the subprocess integration tests.
omni-common = { path = "../../omni-common", features = ["test-support"] }
