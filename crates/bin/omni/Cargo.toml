[package]
name = "omni"
version.workspace = true
edition.workspace = true

[[bin]]
name = "omni"
path = "src/main.rs"

[dependencies]
omni-common = { path = "../../omni-common" }
omni-core = { path = "../../omni-core" }
provider-claude = { path = "../../provider-claude" }
provider-grok = { path = "../../provider-grok" }

axum.workspace = true
tokio.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
uuid.workspace = true
anyhow.workspace = true
clap.workspace = true
async-stream.workspace = true
futures-util.workspace = true

[dev-dependencies]
async-trait = "0.1"
# Enable the build-and-locate helper used by the subprocess integration tests.
omni-common = { path = "../../omni-common", features = ["test-support"] }
