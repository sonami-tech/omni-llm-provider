[package]
name = "omni"
version.workspace = true
edition.workspace = true
rust-version.workspace = true

[[bin]]
name = "omni"
path = "src/main.rs"

[dependencies]
omni-common = { path = "../../omni-common" }
omni-core = { path = "../../omni-core" }
provider-claude = { path = "../../provider-claude" }
provider-codex = { path = "../../provider-codex" }
provider-grok = { path = "../../provider-grok" }

axum.workspace = true
tokio.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
# Already present transitively via tracing-subscriber; declared directly so the
# log-color formatter can name it. Pinned to the version already in the lockfile.
nu-ansi-term = "0.50"
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
uuid.workspace = true
anyhow.workspace = true
clap.workspace = true
async-stream.workspace = true
futures-util.workspace = true

[dev-dependencies]
async-trait = "0.1"
# Enable the build-and-locate helper used by the subprocess integration tests.
omni-common = { path = "../../omni-common", features = ["test-support"] }
tower = "0.5"
# Captures tracing output so the correlation-span tests can assert request_id /
# session_id actually reach the emitted log lines.
tracing-test = "0.2"
wiremock = "0.6.5"
